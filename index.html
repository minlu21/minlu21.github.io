<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link
			href="https://fonts.googleapis.com/css?family=Pacifico"
			rel="stylesheet"
		/>

		<link rel="stylesheet" href="style.css">

		<title>Timer</title>
	</head>
	<body>
		<div class="container">
			<!-- <h1>Pomodoro Timer</h1> -->

			<div id="pomodoro">
				<!-- <img
					src="https://pngimg.com/uploads/tomato/tomato_PNG12592.png"
					style="width: 50%;"
				/> -->
				<div id="status"></div>
				<div class="timerDisplay">25:00</div>
				<div id="btns">
					<button id="start-btn" class="btn">Start</button>
					<button id="reset" class="btn">Set Timer</button>
					<button id="finished" class="btn">Finished</button>
				</div>
			</div>

			<div class="settings">
				<div id="work">
					<p>Work Duration</p>
					<button class="btn-settings" id="work-plus">+</button>
					<span id="work-min">25</span> mins
					<button class="btn-settings" id="work-minus">-</button>
				</div>

				<div id="break">
					<p>Break Duration</p>
					<button class="btn-settings" id="break-plus">+</button>
					<span id="break-min">5</span> mins
					<button class="btn-settings" id="break-minus">-</button>
				</div>
			</div>
		</div>

		<script src="index.js"></script>
	</body>
</html>
